    - resource: Script
      id: InstallPowerShellFzfIntegration
      directives:
        description: Install PSReadLine + PSFzf for better interactive PowerShell
      settings:
        GetScript: |
          @{ Result = "Modules checked in TestScript." }
        TestScript: |
          $psrl = Get-Module -ListAvailable PSReadLine | Select-Object -First 1
          $psfzf = Get-Module -ListAvailable PSFzf | Select-Object -First 1
          return [bool]($psrl -and $psfzf)
        SetScript: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue)) {
            Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Host
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted | Out-Host

          Install-Module PSReadLine -Scope CurrentUser -Force | Out-Host
          Install-Module PSFzf     -Scope CurrentUser -Force | Out-Host

    - resource: Script
      id: ConfigurePowerShellProfile
      dependsOn:
        - InstallPowerShellFzfIntegration
        - Ripgrep
        - fd
        - fzf
      directives:
        description: Configure PowerShell profile for rg/fd/fzf quality-of-life
      settings:
        GetScript: |
          @{ Result = "Profile checked in TestScript." }
          TestScript: |
            try {
              $profilePath = $PROFILE
              if ([string]::IsNullOrWhiteSpace($profilePath)) {
                $profilePath = Join-Path $HOME "Documents\PowerShell\Microsoft.PowerShell_profile.ps1"
              }
              if (-not (Test-Path -LiteralPath $profilePath)) { return $false }

              $c = Get-Content -LiteralPath $profilePath -Raw -ErrorAction Stop
              if ($c -match "BEGIN DEV SHELL BASELINE") { return $true }
              return $false
            } catch {
              return $false
            }
        SetScript: |
          $ErrorActionPreference = "Stop"

          $profilePath = $PROFILE
          if ([string]::IsNullOrWhiteSpace($profilePath)) {
            $profilePath = Join-Path $HOME "Documents\PowerShell\Microsoft.PowerShell_profile.ps1"
          }

          $dir = Split-Path -Parent $profilePath
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          if (-not (Test-Path $profilePath)) { New-Item -ItemType File -Force -Path $profilePath | Out-Null }

          $block = @'
          # BEGIN DEV SHELL BASELINE
          Import-Module PSReadLine -ErrorAction SilentlyContinue
          Import-Module PSFzf     -ErrorAction SilentlyContinue
          Set-PsFzfOption -PSReadlineChordProvider 'Ctrl+t' -PSReadlineChordReverseHistory 'Ctrl+r' | Out-Null
          Set-Alias rg  rg  -ErrorAction SilentlyContinue
          Set-Alias fd  fd  -ErrorAction SilentlyContinue

          function fcd {
            $p = fd --type d --hidden --follow --exclude .git 2>$null | fzf
            if ($p) { Set-Location $p }
          }

          function fkill {
            $line = Get-Process | Sort-Object ProcessName | ForEach-Object { "{0}`t{1}" -f $_.Id,$_.ProcessName } | fzf
            if ($line) { $pid = ($line -split "`t")[0]; Stop-Process -Id $pid -Force }
          }

          $env:RIPGREP_CONFIG_PATH = Join-Path $env:USERPROFILE ".ripgreprc"
          if (-not (Test-Path $env:RIPGREP_CONFIG_PATH)) {
            @"
          --hidden
          --follow
          --glob=!.git/*
          "@ | Set-Content -Encoding UTF8 $env:RIPGREP_CONFIG_PATH
          }
          # END DEV SHELL BASELINE
          '@

          $content = Get-Content $profilePath -Raw
          if ($content -notmatch "BEGIN DEV SHELL BASELINE") {
            Add-Content -Path $profilePath -Value "`n$block`n" -Encoding UTF8
          }

