    - resource: Script
      id: VSCodeExtensions
      dependsOn:
        - VSCode
      settings:
        GetScript: |
          @{ Result = "Extension state checked in TestScript" }
        TestScript: |
          $code = (Get-Command code -ErrorAction SilentlyContinue)?.Source
          if (-not $code) { return $false }
          $exts = & $code --list-extensions 2>$null
          $needed = @(
            "ms-vscode-remote.remote-wsl",
            "ms-python.python",
            "esbenp.prettier-vscode",
            "vscodevim.vim"
          )
          return (($needed | Where-Object { $exts -notcontains $_ }).Count -eq 0)
        SetScript: |
          $ErrorActionPreference = "Stop"
          $code = (Get-Command code -ErrorAction SilentlyContinue)?.Source
          if (-not $code) { throw "VS Code CLI (code) not found on PATH yet. Open VS Code once or restart your shell, then re-run winget configure." }

          $needed = @(
            "ms-vscode-remote.remote-wsl",
            "ms-python.python",
            "esbenp.prettier-vscode",
            "vscodevim.vim"
          )

          $exts = & $code --list-extensions 2>$null
          foreach ($e in $needed) {
            if ($exts -notcontains $e) {
              & $code --install-extension $e --force
            }
          }

