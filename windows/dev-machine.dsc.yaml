        description: Set built-in 3-finger swipes to Nothing so GestureSign can handle custom back/forward
      settings:
        Key: "HKEY_CURRENT_USER\\Software\\Microsoft\\Windows\\CurrentVersion\\PrecisionTouchPad"
        ValueName: "ThreeFingerSlideEnabled"
        ValueType: Dword
