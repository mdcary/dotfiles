    - resource: Script
      id: UnpinTaskbarItems
      directives:
        description: Unpin Recall and Microsoft 365/Office from the taskbar (best-effort)
      settings:
        GetScript: |
          @{ Result = "Checked in TestScript." }
        TestScript: |
          $p = Join-Path $env:APPDATA "Microsoft\Internet Explorer\Quick Launch\User Pinned\TaskBar"
          if (-not (Test-Path $p)) { return $true }

          $links = Get-ChildItem $p -Filter *.lnk -ErrorAction SilentlyContinue
          $hits = $links | Where-Object {
            $_.BaseName -match 'Recall' -or $_.BaseName -match 'Microsoft 365' -or $_.BaseName -match 'Office'
          }
          return ($hits.Count -eq 0)
        SetScript: |
          $ErrorActionPreference = "Stop"

          # 1) Remove classic pinned shortcuts
          $p = Join-Path $env:APPDATA "Microsoft\Internet Explorer\Quick Launch\User Pinned\TaskBar"
          if (Test-Path $p) {
            Get-ChildItem $p -Filter *.lnk -ErrorAction SilentlyContinue |
              Where-Object { $_.BaseName -match 'Recall' -or $_.BaseName -match 'Microsoft 365' -or $_.BaseName -match 'Office' } |
              Remove-Item -Force -ErrorAction SilentlyContinue
          }

          # 2) Clear taskbar pin cache (forces refresh/rebuild)
          $taskband = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Taskband"
          if (Test-Path $taskband) {
            Remove-ItemProperty -Path $taskband -Name "Favorites" -ErrorAction SilentlyContinue
            Remove-ItemProperty -Path $taskband -Name "FavoritesResolve" -ErrorAction SilentlyContinue
          }

          # Explorer restart handled by your centralized RestartExplorerIfUxChangesApplied
          Write-Host "Pins updated. If they reappear after logon, check for OEM/policy taskbar pinning."

