    - resource: Script
      id: PrimeWindowsTerminalSettingsJson
      dependsOn:
        - WindowsTerminal
      directives:
        description: Launch Windows Terminal once (non-elevated) and wait for settings.json to exist
      settings:
        GetScript: |
          @{ Result = "settings.json presence checked in TestScript." }
        TestScript: |
          $paths = @(
            (Join-Path $env:LOCALAPPDATA "Packages\Microsoft.WindowsTerminal_8wekyb3d8bbwe\LocalState\settings.json"),
            (Join-Path $env:LOCALAPPDATA "Packages\Microsoft.WindowsTerminalPreview_8wekyb3d8bbwe\LocalState\settings.json")
          )
          return [bool]($paths | Where-Object { Test-Path $_ } | Select-Object -First 1)
        SetScript: |
          $ErrorActionPreference = "Stop"

          # Start Terminal (best-effort). It may already be running.
          Start-Process "wt.exe" -WindowStyle Hidden -ErrorAction SilentlyContinue | Out-Null

          $paths = @(
            (Join-Path $env:LOCALAPPDATA "Packages\Microsoft.WindowsTerminal_8wekyb3d8bbwe\LocalState\settings.json"),
            (Join-Path $env:LOCALAPPDATA "Packages\Microsoft.WindowsTerminalPreview_8wekyb3d8bbwe\LocalState\settings.json")
          )

          $deadline = (Get-Date).AddSeconds(20)
          while ((Get-Date) -lt $deadline) {
            $p = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($p) { return }
            Start-Sleep -Milliseconds 500
          }

          throw "Windows Terminal settings.json not created yet. Try launching Terminal once manually, then re-run winget configure."

