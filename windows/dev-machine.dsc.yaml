    #
    # --- CapsLock -> Ctrl
    #
    - resource: Script
      id: RemapCapsLockToCtrl_ScancodeMap
      directives:
        description: Remap CapsLock to Left Control via Scancode Map (requires reboot)
        securityContext: elevated
      settings:
        GetScript: |
          @{ Result = "ScancodeMap checked in TestScript." }
        TestScript: |
          $k = "HKLM:\SYSTEM\CurrentControlSet\Control\Keyboard Layout"
          try {
            $v = (Get-ItemProperty -Path $k -Name "Scancode Map" -ErrorAction Stop)."Scancode Map"
          } catch { return $false }

          # Expected bytes: map Caps (0x3A) -> LCtrl (0x1D)
          $expected = [byte[]](
            0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00,
            0x02,0x00,0x00,0x00,
            0x1D,0x00,0x3A,0x00,
            0x00,0x00,0x00,0x00
          )

          if ($v.Length -ne $expected.Length) { return $false }
          for ($i=0; $i -lt $expected.Length; $i++) {
            if ($v[$i] -ne $expected[$i]) { return $false }
          }
          return $true
        SetScript: |
          $ErrorActionPreference = "Stop"
          $k = "HKLM:\SYSTEM\CurrentControlSet\Control\Keyboard Layout"
          New-Item -Path $k -Force | Out-Null

          $bytes = [byte[]](
            0x00,0x00,0x00,0x00, 0x00,0x00,0x00,0x00,
            0x02,0x00,0x00,0x00,
            0x1D,0x00,0x3A,0x00,
            0x00,0x00,0x00,0x00
          )

          New-ItemProperty -Path $k -Name "Scancode Map" -PropertyType Binary -Value $bytes -Force | Out-Null
          Write-Host "CapsLock remapped. Reboot required."

    #
